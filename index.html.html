<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake: Safe Food Edition</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --hue: 150; --color: hsl(var(--hue), 100%, 50%); }
        body {
            background-color: #000; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; font-family: 'Press Start 2P', cursive;
            overflow: hidden; touch-action: none; user-select: none;
        }
        .celebrate { animation: flash 0.3s ease-out; }
        @keyframes flash {
            0% { background-color: var(--color); }
            100% { background-color: #000; }
        }
        #ui-top { margin-bottom: 20px; font-size: 16px; color: var(--color); text-shadow: 0 0 10px var(--color); }
        #game-container { position: relative; border: 4px solid var(--color); box-shadow: 0 0 25px var(--color); background-color: #050505; }
        canvas {
            display: block;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        #speech-bubble {
            position: absolute; background: white; color: black; padding: 15px; border-radius: 12px;
            font-size: 12px; bottom: 115%; left: 50%; transform: translateX(-50%);
            display: none; box-shadow: 0 0 20px white; z-index: 10; border: 3px solid black;
            width: 260px; text-align: center; line-height: 1.4;
        }
        #mobile-controls { display: none; grid-template-areas: ". up ." "left . right" ". down ."; gap: 12px; margin-top: 25px; }
        .btn { width: 60px; height: 60px; border: 3px solid var(--color); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); color: white; font-size: 20px; box-shadow: 0 0 10px var(--color); touch-action: none; }
        @media (max-width: 768px) { #mobile-controls { display: grid; } }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; text-align: center; padding: 20px; }
    </style>
</head>
<body id="game-body">

    <div id="ui-top">SCORE: <span id="score">0</span></div>

    <div id="game-container">
        <div id="speech-bubble">ISSO É SIMPLESMENTE DELICIOSO!</div>
        <canvas id="canvas" width="360" height="360"></canvas>
        <div id="game-over" class="overlay">
            <h1 style="color: #ff3e3e; font-size: 20px;">SISTEMA FALHOU</h1>
            <p id="death-quote" style="font-size: 10px; color: #aaa; margin: 15px 0; line-height: 1.5;">"..."</p>
            <button onclick="location.reload()" style="font-family: 'Press Start 2P'; padding: 15px; cursor:pointer; background: var(--color); border:none; border-radius:5px; font-weight:bold;">REINICIAR</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="btn" style="grid-area: up" onpointerdown="handleMove(0,-1)">▲</div>
        <div class="btn" style="grid-area: left" onpointerdown="handleMove(-1,0)">◀</div>
        <div class="btn" style="grid-area: right" onpointerdown="handleMove(1,0)">▶</div>
        <div class="btn" style="grid-area: down" onpointerdown="handleMove(0,1)">▼</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bubble = document.getElementById('speech-bubble');
        const gameBody = document.getElementById('game-body');
        
        const size = 30; 
        const tiles = canvas.width / size;
        const hue = Math.floor(Math.random() * 360);
        document.documentElement.style.setProperty('--hue', hue);
        
        const color = `hsl(${hue}, 100%, 50%)`;
        const fColor = `hsl(${(hue + 140) % 360}, 100%, 60%)`;

        let snake = [{x: 6, y: 6}]; 
        let food = {x: 9, y: 6};
        let dx = 0, dy = 0, score = 0;
        let started = false, active = true;

        const phrases = ["SABOR DIGITAL!", "MAIS ENERGIA!", "ESTOU CRESCENDO!", "DELÍCIA NEON!", "PERFEITO!"];
        const deathPhrases = ["A luz se apagou...", "Mordi minha cauda!", "Bati na parede...", "Sinal perdido..."];

        function handleMove(x, y) {
            if (!active) return;
            if (started && x === -dx && y === -dy) return;
            dx = x; dy = y;
            started = true;
        }

        window.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'enter' && !active) location.reload();
            if (['arrowup','w'].includes(key)) handleMove(0, -1);
            if (['arrowdown','s'].includes(key)) handleMove(0, 1);
            if (['arrowleft','a'].includes(key)) handleMove(-1, 0);
            if (['arrowright','d'].includes(key)) handleMove(1, 0);
        });

        function celebrate() {
            gameBody.classList.remove('celebrate');
            void gameBody.offsetWidth; 
            gameBody.classList.add('celebrate');
        }

        function update() {
            if (!started || !active) return;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tiles || head.y < 0 || head.y >= tiles) return endGame();
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return endGame();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                celebrate();
                showBubble();
                gerarComidaSegura();
            } else {
                snake.pop();
            }
        }

        // --- FUNÇÃO CORRIGIDA ---
        function gerarComidaSegura() {
            let novaPos;
            let ocupado = true;

            while (ocupado) {
                novaPos = {
                    x: Math.floor(Math.random() * tiles),
                    y: Math.floor(Math.random() * tiles)
                };

                // Verifica se a nova posição coincide com qualquer parte da cobra
                ocupado = snake.some(parte => parte.x === novaPos.x && parte.y === novaPos.y);
            }
            food = novaPos;
        }

        function endGame() {
            active = false;
            document.getElementById('death-quote').innerText = `"${deathPhrases[Math.floor(Math.random()*deathPhrases.length)]}"`;
            document.getElementById('game-over').style.display = 'flex';
        }

        function showBubble() {
            bubble.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            bubble.style.display = 'block';
            setTimeout(() => bubble.style.display = 'none', 1500);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fruta (Brilho Neon)
            ctx.shadowBlur = 25; ctx.shadowColor = fColor; ctx.fillStyle = fColor;
            ctx.beginPath(); 
            ctx.arc(food.x * size + 15, food.y * size + 15, 11, 0, Math.PI * 2); 
            ctx.fill();

            // Desenhar Cobra Conectada com Aura
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            // Aura
            ctx.shadowBlur = 25; ctx.shadowColor = color; ctx.strokeStyle = color;
            ctx.lineWidth = size - 6;
            ctx.beginPath();
            ctx.moveTo(snake[0].x * size + 15, snake[0].y * size + 15);
            snake.forEach(p => ctx.lineTo(p.x * size + 15, p.y * size + 15));
            ctx.stroke();

            // Núcleo
            ctx.shadowBlur = 5; ctx.shadowColor = "#fff"; ctx.strokeStyle = "#fff";
            ctx.lineWidth = size - 18;
            ctx.beginPath();
            ctx.moveTo(snake[0].x * size + 15, snake[0].y * size + 15);
            snake.forEach(p => ctx.lineTo(p.x * size + 15, p.y * size + 15));
            ctx.stroke();

            // Olhos
            ctx.shadowBlur = 0; ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(snake[0].x * size + 10, snake[0].y * size + 12, 3, 0, Math.PI * 2);
            ctx.arc(snake[0].x * size + 20, snake[0].y * size + 12, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            setTimeout(loop, 180); 
        }

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('contextmenu', e => e.preventDefault());
        });

        loop();
    </script>
</body>
</html>
